# Dashboard status card configuration
#
# Card types:
#   compact  - Single value in the grid (1x1). Default if omitted.
#   detail   - Full-width card with one column per field
#   image    - Camera feed in the grid (2x2)
#
# Thresholds (compact only): error / warn / ok
#   Operators: <, >, <=, >=, ==, !=
#   Numbers: "< 20"    Strings: "== 'Error'"
#
# Activity indicator: never (default) / always / changed / unchanged
#   Border flash on incoming messages matching the condition.

status_cards:
  - type: compact
    label: "Battery"
    topic: "/power/battery_level"
    message_type: "std_msgs/msg/Float32"
    field: "data"
    unit: "%"
    decimals: 0
    thresholds:
      error: "< 20"
      warn: "< 70"
      ok: ">= 70"
    activity: changed

  - type: compact
    label: "Linear Speed"
    topic: "/odom"
    message_type: "nav_msgs/msg/Odometry"
    field: "twist.twist.linear.x"
    unit: "m/s"
    decimals: 2
    activity: always

  - type: compact
    label: "Mode"
    topic: "/robot_mode"
    message_type: "std_msgs/msg/String"
    field: "data"
    thresholds:
      error: "== 'Error'"
      warn: "== 'Charging'"
      ok: "== 'Idle'"
    activity: unchanged

  - type: compact
    label: "Position (XY)"
    topic: "/odom"
    message_type: "nav_msgs/msg/Odometry"
    fields:
      x: "pose.pose.position.x"
      y: "pose.pose.position.y"
    format: "{x:.2f}, {y:.2f}"
    unit: "m"

#  - type: image
#    label: "Front Camera"
#    topic: "/femto_mega/color/image_raw/compressed"
#    message_type: "sensor_msgs/msg/CompressedImage"
#    max_fps: 5

  - type: detail
    label: "Position"
    topic: "/odom"
    message_type: "nav_msgs/msg/Odometry"
    fields:
      x: "pose.pose.position.x"
      y: "pose.pose.position.y"
      z: "pose.pose.position.z"
    unit: "m"
    decimals: 3
