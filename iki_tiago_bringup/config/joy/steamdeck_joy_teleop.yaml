# Key mapping:
# Axes:
# 0 -> Left stick -> left 1 | right -1
# 1 -> Left stick -> up 1 | down -1
# 2 -> Right stick -> left 1 | right -1
# 3 -> Right stick -> up 1 | down -1
# 4 -> Left DPad -> left 1 | right -1
# 5 -> Left DPad -> up 1 | down -1
# 6 -> Right DPad -> left 1 | right -1
# 7 -> Right DPad -> up 1 | down -1
# 8 -> L2 1 unpressed, goes towards -1 when pressed (Also button 9)
# 9 -> R2 1 unpressed, goes towards -1 when pressed (Also button 10)
# Buttons:
# 0 -> Left DPad click
# 1 -> Right DPad click
# 2 -> Three dots button under right dpad
# 3 -> A
# 4 -> B
# 5 -> X
# 6 -> Y
# 7 -> L1
# 8 -> R1
# 9 -> L2 (Also axis 8)
# 10 -> R2 (Also axis 9)
# 11 -> Wierd button between left stick and arrows
# 12 -> Wierd button between right stick and letter buttons
# 13 -> Steam button
# 14 -> Left stick click
# 15 -> Right stick click
# 16 -> Up arrow
# 17 -> Down arrow
# 18 -> Left arrow
# 19 -> Right arrow
# 20 -> L4
# 21 -> R4
# 22 -> L5
# 23 -> R5

/**:
  ros__parameters:
    # --------------------
    # Normal speed (hold R1 only)
    # --------------------
    move_normal:
      type: topic
      interface_type: geometry_msgs/msg/Twist
      topic_name: /steamdeck_vel
      deadman_buttons: [8]              # R1
      allow_multiple_commands: false    # IMPORTANT: don't also trigger when turbo button is held
      axis_mappings:
        linear-x:
          axis: 1
          scale: 0.4
          offset: 0.0
        angular-z:
          axis: 2
          scale: 1.0
          offset: 0.0

    # --------------------
    # Turbo speed (hold L1 + R1)
    # --------------------
    move_turbo:
      type: topic
      interface_type: geometry_msgs/msg/Twist
      topic_name: /steamdeck_vel
      deadman_buttons: [7, 8]           # L1 + R1
      allow_multiple_commands: true
      axis_mappings:
        linear-x:
          axis: 1
          scale: 0.8
          offset: 0.0
        angular-z:
          axis: 2
          scale: 2.0
          offset: 0.0

    torso_up:
      type: action
      interface_type: teleop_tools_msgs/action/Increment
      action_name: /torso_controller/increment
      action_goal:
        increment_by: [0.05]
      buttons: [10] # R2

    torso_down:
      type: action
      interface_type: teleop_tools_msgs/action/Increment
      action_name: /torso_controller/increment
      action_goal:
        increment_by: [-0.05]
      buttons: [9] # L2

    head_down:
      type: action
      interface_type: teleop_tools_msgs/action/Increment
      action_name: /head_controller/increment
      action_goal:
        #increment_by: [-0.1, 0.0] This is as pal has it set but idk why its inverted
        increment_by: [0.0, -0.1]
      buttons: [3] # A

    head_up:
      type: action
      interface_type: teleop_tools_msgs/action/Increment
      action_name: /head_controller/increment
      action_goal:
        #increment_by: [0.1, 0.0] This is as pal has it set but idk why its inverted
        increment_by: [0.0, 0.1]
      buttons: [6] # Y

    head_left:
      type: action
      interface_type: teleop_tools_msgs/action/Increment
      action_name: /head_controller/increment
      action_goal:
        #increment_by: [0.0, 0.1] This is as pal has it set but idk why its inverted
        increment_by: [0.1, 0.0]
      buttons: [5] # X

    head_right:
      type: action
      interface_type: teleop_tools_msgs/action/Increment
      action_name: /head_controller/increment
      action_goal:
        #increment_by: [0.0, -0.1] This is as pal has it set but idk why its inverted
        increment_by: [-0.1, 0.0]
      buttons: [4] # B

    gripper_close:
      type: action
      interface_type: teleop_tools_msgs/action/Increment
      action_name: /gripper_controller/increment
      action_goal:
        increment_by: [-0.01, -0.01]
      buttons: [21] # R4
    
    gripper_open:
      type: action
      interface_type: teleop_tools_msgs/action/Increment
      action_name: /gripper_controller/increment
      action_goal:
        increment_by: [0.01, 0.01]
      buttons: [20] # L4


    joy_priority: # This should take overall priority so nav works or not
      type: action
      interface_type: twist_mux_msgs/action/JoyPriority
      action_name: joy_priority_action
      buttons: [13]