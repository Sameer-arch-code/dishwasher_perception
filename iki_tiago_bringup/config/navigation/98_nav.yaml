/controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 50.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: progress_checker
    goal_checker_plugins: ['general_goal_checker']
    controller_plugins: ['FollowPath']
    odom_topic: mobile_base_controller/odom
    speed_limit_topic: speed_limit
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.2 # 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.25 # 0.2
      yaw_goal_tolerance: 0.15 #0.15
      stateful: True
    FollowPath:
      # Added
      #plugin: nav2_mppi_controller::MPPIController
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      angular_dist_threshold: 1.0
      forward_sampling_distance: 0.5
      angular_disengage_threshold: 0.65
      rotate_to_heading_angular_vel: 0.8
      max_angular_accel: 1.5
      simulate_ahead_time: 1.0
      rotate_to_goal_heading: true
      primary_controller: "nav2_mppi_controller::MPPIController"
      time_steps: 100 #56
      model_dt: 0.02
      batch_size: 3000 #2000
      vx_std: 0.25  # 0.4
      vx_min: 0.0  # 0.0
      vx_max: 0.5  # 1.0
      vy_std: 0.0
      vy_min: 0.0
      vy_max: 0.0
      wz_std: 0.4 # 0.4
        #wz_min: -1.2  # -2.0
      wz_max: 1.0  # 2.0
        #ax_max: 0.6  # 1.0
        #ax_min: -0.6 # 0.0
        #ay_max: 0.0
        #ay_min: 0.0
      iteration_count: 1 #1
      prune_distance: 1.5 # 1.7
      transform_tolerance: 0.3
      temperature: 0.3 #0.3
      gamma: 0.015
      motion_model: DiffDrive
      visualize: False
      reset_period: 1.0
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstrains:
        min_turning_r: 0.0
      critics:
        - ConstraintCritic
        - CostCritic
        - GoalCritic
        - GoalAngleCritic
        - PathAlignCritic
        - PathFollowCritic
        - PathAngleCritic
        - PreferForwardCritic
        - TwirlingCritic
      ConstraintCritic:
        enabled: True
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: True
        cost_power: 1
        cost_weight: 8.0 # 5.0
        threshold_to_consider: 1.4 # 1.4
      GoalAngleCritic:
        enabled: True
        cost_power: 1
        cost_weight: 4.0 # 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: True
        cost_power: 1
        cost_weight: 3.0 #5.0
        threshold_to_consider: 0.8 # 0.5
      CostCritic:
        enabled: True
      PathAlignCritic:
        enabled: True
        cost_power: 1
        cost_weight: 10.0 #20.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 3
        threshold_to_consider: 0.5
        offset_from_furthest: 15 # 20
        use_path_orientations: False
      PathFollowCritic:
        enabled: True
        cost_power: 1
        cost_weight: 10.0 # 5.0
        offset_from_furthest: 4 # 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: True
        cost_power: 1
        cost_weight: 3.0 # 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
      TwirlingCritic:
        enabled: true
        twirling_cost_power: 1
        twirling_cost_weight: 10.0


# Default preset from pal is using smac2d only and is called GridBased, now we move gridbased to be navfn but keep the name

/planner_server:
  ros__parameters:
    planner_plugins: ['GridBased', 'Smac2D']
    use_sim_time: False
    expected_planner_frequency: 20.0
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.5
      use_astar: false
      allow_unknown: false  # true
    Smac2D:
        plugin: nav2_smac_planner/SmacPlanner2D
        tolerance: 0.125
        downsample_costmap: False
        downsampling_factor: 1
        allow_unknown: false  # true
        max_iterations: 1000000
        max_on_approach_iterations: 1000
        max_planning_time: 2.0
        cost_travel_multiplier: 7.5
        use_final_approach_orientation: False
        smoother:
            max_iterations: 1000
            w_smooth: 0.3
            w_data: 0.2

/global_costmap:
  ros__parameters:
    filters: ['keepout_filter']
  #['static_layer', 'obstacle_laser_layer', 'obstacle_rgbd_layer', 'inflation_layer']
    plugins: ['static_layer', 'obstacle_laser_layer', 'obstacle_rgbd_to_laserscan_layer', 'inflation_layer']

    keepout_filter:
      plugin: "nav2_costmap_2d::KeepoutFilter"
      enabled: True
      filter_info_topic: "/bounds_manager/mask_info"
      transform_tolerance: 0.5
      override_lethal_cost: False

    speed_filter:
      enabled: false

    no_go_zones:
      plugin: "nav2_costmap_2d::StaticLayer"
      enabled: true
      subscribe_to_updates: true
      map_subscribe_transient_local: true
      transform_tolerance: 0.5
      map_topic: /bounds_manager/map

    obstacle_rgbd_to_laserscan_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: True
      observation_sources: rgbd_to_laserscan
      footprint_clearing_enabled: true
      max_obstacle_height: 2.0
      combination_method: 1
      rgbd_to_laserscan:
        topic: /head_front_camera/depth/scan
        obstacle_max_range: 3.5
        obstacle_min_range: 0.0
        raytrace_max_range: 5.0
        raytrace_min_range: 0.0
        max_obstacle_height: 2.0
        min_obstacle_height: 0.0
        clearing: True
        marking: True
        data_type: "LaserScan"
        inf_is_valid: True

    inflation_layer:
      inflation_radius: 0.4 #0.55
      cost_scaling_factor: 4.0 #3.0


/local_costmap:
  ros__parameters:
    filters: ['keepout_filter']
    # plugins: ['obstacle_laser_layer', 'obstacle_rgbd_layer', 'inflation_layer']
    #plugins:  ['obstacle_laser_layer', 'obstacle_rgbd_layer', 'inflation_layer', 'sonar_layer']
    #plugins:  ['voxel_rgbd_layer', 'obstacle_laser_layer', 'inflation_layer', 'sonar_layer'] #change to voxel
    plugins:  ['obstacle_laser_layer', 'obstacle_rgbd_to_laserscan_layer', 'inflation_layer']


    width: 5
    height: 5

    keepout_filter:
      plugin: "nav2_costmap_2d::KeepoutFilter"
      enabled: True
      filter_info_topic: "/bounds_manager/mask_info"
      transform_tolerance: 0.5
      override_lethal_cost: False

    obstacle_rgbd_to_laserscan_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: True
      observation_sources: rgbd_to_laserscan
      footprint_clearing_enabled: true
      max_obstacle_height: 2.0
      combination_method: 1
      rgbd_to_laserscan:
        topic: /head_front_camera/depth/scan
        obstacle_max_range: 3.5
        obstacle_min_range: 0.0
        raytrace_max_range: 5.0
        raytrace_min_range: 0.0
        max_obstacle_height: 2.0
        min_obstacle_height: 0.0
        clearing: True
        marking: True
        data_type: "LaserScan"
        inf_is_valid: True

    voxel_rgbd_layer:
      plugin: "nav2_costmap_2d::VoxelLayer"
      enabled: True
      transform_tolerance: 0.5 # wasnt here before
      footprint_clearing_enabled: true
      max_obstacle_height: 2.0
      publish_voxel_map: True
      origin_z: -0.2
      z_resolution: 0.1
      z_voxels: 16
      max_obstacle_height: 2.0
      unknown_threshold: 15
      mark_threshold: 2
      observation_sources: pointcloud
      combination_method: 1
      pointcloud:  # no frame set, uses frame from message
        topic: /head_front_camera/depth/points
        observation_persistence: 0.0
        expected_update_rate: 0.0
        max_obstacle_height: 2.0
        min_obstacle_height: 0.07
        obstacle_max_range: 3.0
        obstacle_min_range: 0.0
        raytrace_max_range: 5.0
        raytrace_min_range: 0.0
        clearing: False
        marking: True
        data_type: "PointCloud2"
        transport_type: "raw"  # raw or/ with compression (zlib, draco, zstd)

    obstacle_rgbd_layer:
      footprint_clearing_enabled: false  # false
      min_obstacle_height: 0.1  # 0.0
      rgbd:
        clearing: True
        min_obstacle_height: 0.1
        expected_update_rate: 0.2  # 0.2
        obstacle_max_range: 4.0  # 5.5
        raytrace_max_range: 6.0  # 6.0

    inflation_layer:
      inflation_radius: 0.4 #0.55
      cost_scaling_factor: 4.0 #3.0

    sonar_layer:
      plugin: "nav2_costmap_2d::RangeSensorLayer"
      enabled: true
      topics: ['/sonar_base']
      phi: 1.2
      infalte_cone: 1.0
      no_readings_timeout: 0.0
      clear_threshold: 0.2
      mark_threshold: 0.8
      clear_on_max_reading: true
      input_sensor_type: "ALL"

