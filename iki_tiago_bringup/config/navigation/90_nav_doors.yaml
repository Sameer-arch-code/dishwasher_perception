/controller_server:
  ros__parameters:
    /bond_disable_heartbeat_timeout: true
    AssistedTeleop:
      max_angular_vel: 2.0
      max_linear_vel: 0.4
      plugin: pal_assisted_teleop::PalAssistedTeleop
      simulate_ahead_time: 1.0
      simulation_time_step: 0.05
      transform_tolerance: 0.5
      vel_topics:
      - joy_vel
      - rviz_joy_vel
      - key_vel
    FollowPath:
      ConstraintCritic:
        cost_power: 1
        cost_weight: 4.0
        enabled: true
      CostCritic:
        collision_cost: 1000000.0
        consider_footprint: false
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        enabled: true
        inflation_layer_name: ''
        near_goal_distance: 0.5
      GoalAngleCritic:
        cost_power: 1
        cost_weight: 3.0
        enabled: true
        threshold_to_consider: 0.5
      GoalCritic:
        cost_power: 1
        cost_weight: 5.0
        enabled: true
        threshold_to_consider: 1.4
      PathAlignCritic:
        cost_power: 1
        cost_weight: 10.0 # 20.0
        enabled: true
        max_path_occupancy_ratio: 0.05
        offset_from_furthest: 20
        threshold_to_consider: 0.5
        trajectory_point_step: 3
        use_path_orientations: false
      PathAngleCritic:
        cost_power: 1
        cost_weight: 2.0
        enabled: true
        forward_preference: true
        max_angle_to_furthest: 1.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
      PathFollowCritic:
        cost_power: 1
        cost_weight: 5.0
        enabled: true
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PreferForwardCritic:
        cost_power: 1
        cost_weight: 5.0
        enabled: true
        threshold_to_consider: 0.5
      TrajectoryVisualizer:
        time_step: 3
        trajectory_step: 5
      batch_size: 2000
      critics:
      - ConstraintCritic
      - CostCritic
      - GoalCritic
      - GoalAngleCritic
      - PathAlignCritic
      - PathFollowCritic
      - PathAngleCritic
      - PreferForwardCritic
      enforce_path_inversion: false
      gamma: 0.015
      iteration_count: 1
      max_robot_pose_search_dist: 2.5
      model_dt: 0.02
      motion_model: DiffDrive
      plugin: nav2_mppi_controller::MPPIController
      prune_distance: 1.7
      regenerate_noises: false
      reset_period: 1.0
      retry_attempt_limit: 1
      temperature: 0.3
      time_steps: 56
      transform_tolerance: 0.3
      visualize: false
      ax_max: 0.5 # 1.0
      vx_max: 0.5 # 1.0
      vx_min: 0.0
      vx_std: 0.3 # 0.4
      vy_max: 0.0
      vy_std: 0.0
      wz_max: 1.0 # 2.0
      wz_min: -1.0 # -2.0
      wz_std: 0.3 # 0.4
    controller_frequency: 50.0
    controller_plugins:
    - FollowPath
    - AssistedTeleop
    controller_server:
      verbose: false
    failure_tolerance: 0.3
    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.2
      yaw_goal_tolerance: 0.15
    goal_checker_plugins:
    - general_goal_checker
    min_theta_velocity_threshold: 0.001
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    odom_topic: mobile_base_controller/odom
    progress_checker:
      movement_time_allowance: 10.0
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.5
    progress_checker_plugin: progress_checker
    speed_limit_topic: speed_limit
    use_sim_time: false

/planner_server:
  ros__parameters:
    GridBased:
      allow_unknown: false # true

/local_costmap:
  ros__parameters:
    obstacle_rgbd_layer:
      footprint_clearing_enabled: true # false
      min_obstacle_height: 0.05 # 0.0
      rgbd:
        expected_update_rate: 0.0 # 0.2
        obstacle_max_range: 4.0 #5.5
        raytrace_max_range: 4.5 #6.0

    obstacle_laser_layer:
      scan:
        expected_update_rate: 0.0 # 0.2

    inflation_layer:
      inflation_radius: 0.3 # 0.55
      cost_scaling_ffactor: 2.0 #3.0

/global_costmap:
  ros__parameters:
    plugins: ['static_layer', 'inflation_layer']
  #['static_layer', 'obstacle_laser_layer', 'obstacle_rgbd_layer', 'inflation_layer']
    inflation_layer:
      inflation_radius: 0.25 #0.55
      cost_scaling_faactor: 2.0 #3.0
