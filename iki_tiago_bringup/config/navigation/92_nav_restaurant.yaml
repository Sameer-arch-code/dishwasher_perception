/controller_server:
  ros__parameters:
    FollowPath:
      vx_std: 0.25
      vx_max: 0.5
      wz_std: 0.4
      wz_max: 1.0

/local_costmap:
  ros__parameters:

    transform_tolerance: 0.5

    inflation_layer:
      inflation_radius: 0.4
      cost_scaling_factor: 4.0

/planner_server:
  ros__parameters:
    GridBased:
      allow_unknown: true  # true

/global_costmap:
  ros__parameters:
    transform_tolerance: 0.5
    global_frame: map
    robot_base_frame: base_footprint
    always_send_full_costmap: false
    rolling_window: true
    width: 80
    height: 80

    inflation_layer:
      inflation_radius: 0.4
      cost_scaling_factor: 4.0

