/**:
  ros__parameters:
    # GStreamer audio source element (e.g. "alsasrc", "pulsesrc")
    src: "pulsesrc"
    pulse_server: "unix:/run/user/1000/pulse/native"
    pulse_client_name: "tiago_audio"

    # "appsink" sends audio into this node (and then to ROS topic),
    # any other string is treated as a file path for "filesink"
    dst: "appsink"

    # if device isn't specified, it will use the default which is
    # the alsa default source.
    # A valid device will be of the form hw:0,0 with other numbers
    # than 0 and 0 as are available.
    # 
    # To list available audio input devices:
    #   for alsa audio use:  arecord -l
    #   for pulse audio use: pactl list sources short
    # 
    # For Rode VideoMic Me-C+:
    device: "alsa_input.usb-R__DE_R__DE_VideoMic_Me-C__277418BE-00.mono-fallback"
    # 
    # For internal microphone of the Zotac box:
    # device: "alsa_input.usb-ESS_Technology_ESS_USB_DAC-00.mono-fallback"

    format: "wave" # "wave" → raw PCM to appsink/filesink; "mp3" → compressed MP3 via lamemp3enc
    bitrate: 192 # MP3 bitrate in kbit/s, only relevant when format == "mp3"

    sample_format: "S16LE" # PCM format string; signed 16-bit, little endian (matches depth=16)
    channels: 1 # Number of audio channels; 1 = mono
    depth: 16 # Bits per sample; 16 bits is standard for PCM speech audio
    sample_rate: 16000 # Sampling rate in Hz; 16000 is common
