/**:
  ros__parameters:
    # Booleans should be real booleans (true/false), not strings
    camera_name: "astra2"
    namespace: ""
    serial_number: "AAUY542001F"

    enable_sync_host_time: false


    product_id: ""
    usb_port: "4-2"
    device_num: 4
    uvc_backend: "libuvc"

    sync_mode: "standalone"
    enable_d2c_viewer: false
    enable_ldp: true
    ordered_pc: true
    enable_depth_scale: true
    align_mode: "HW"
    laser_energy_level: -1
    enable_heartbeat: false
    time_domain: "global"

    depth_registration: true
    enable_point_cloud: true
    enable_colored_point_cloud: true
    cloud_frame_id: ""
    point_cloud_qos: "default"
    connection_delay: 100

    depth_width: 800
    depth_height: 600
    depth_fps: 10
    depth_format: "Y16"
    enable_depth: true
    depth_flip: false
    depth_qos: "sensor_data"
    depth_camera_info_qos: "default"

    color_width: 1280
    color_height: 720
    color_fps: 10
    color_format: "rgb"
    enable_color: true
    color_flip: false
    color_qos: "default"
    color_camera_info_qos: "default"
    enable_color_auto_exposure: true
    color_ae_max_exposure: -1
    color_exposure: -1
    color_gain: -1
    color_brightness: -1
    enable_color_auto_white_balance: true
    color_white_balance: -1

    ir_width: 800
    ir_height: 600
    ir_fps: 15
    ir_format: "Y8"
    enable_ir: false
    ir_flip: false
    ir_qos: "default"
    ir_camera_info_qos: "default"
    enable_ir_auto_exposure: true
    ir_ae_max_exposure: -1
    ir_exposure: -1
    ir_gain: -1
    ir_brightness: -1

    enable_sync_output_accel_gyro: false
    enable_accel: false
    accel_rate: "100hz"       # keep as string if the driver expects that literal
    accel_range: "4g"
    enable_gyro: false
    gyro_rate: "100hz"
    gyro_range: "1000dps"
    liner_accel_cov: 0.01
    angular_vel_cov: 0.01

    publish_tf: false
    tf_publish_rate: 0.0
    ir_info_url: ""
    color_info_url: ""
    log_level: "none"
    enable_publish_extrinsic: false
    enable_frame_sync: false

    enable_decimation_filter: false
    enable_threshold_filter: false
    enable_noise_removal_filter: false
    enable_spatial_filter: false
    enable_temporal_filter: false
    enable_disaparity_to_depth: false   # keep the original spelling if the driver uses it
    enable_hole_filling_filter: false

    decimation_filter_scale: -1
    threshold_filter_max: -1
    threshold_filter_min: -1
    noise_removal_filter_min_diff: 256
    noise_removal_filter_max_size: 1000

    spatial_filter_alpha: -1.0
    spatial_filter_diff_threshold: -1
    spatial_filter_magnitude: -1
    spatial_filter_radius: -1

    temporal_filter_diff_threshold: -1.0
    temporal_filter_weight: -1.0
    hole_filling_filter_mode: ""

